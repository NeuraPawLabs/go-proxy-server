name: Release

"on":
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  prepare-frontend:
    name: Prepare Frontend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - name: Install frontend dependencies
        working-directory: web-ui
        run: npm ci

      - name: Build frontend
        working-directory: web-ui
        run: npm run build

      - name: Copy frontend dist for embed
        run: ./scripts/sync_frontend_dist.sh

      - name: Upload embedded frontend
        uses: actions/upload-artifact@v4
        with:
          name: embedded-frontend
          path: internal/web/dist
          if-no-files-found: error

  build-release-assets:
    name: Build ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    needs: prepare-frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive_ext: tar.gz
          - goos: linux
            goarch: arm64
            archive_ext: tar.gz
          - goos: windows
            goarch: amd64
            archive_ext: zip
          - goos: darwin
            goarch: amd64
            archive_ext: tar.gz
          - goos: darwin
            goarch: arm64
            archive_ext: tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download embedded frontend
        uses: actions/download-artifact@v4
        with:
          name: embedded-frontend
          path: internal/web/dist

      - name: Prepare release metadata
        run: |
          echo "TAG_NAME=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "ASSET_BASENAME=go-proxy-server-${GITHUB_REF_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}" >> "$GITHUB_ENV"

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          mkdir -p dist staging

          binary_name="go-proxy-server"
          if [ "${GOOS}" = "windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          go build -tags frontend_embed -trimpath -ldflags="-s -w" -o "dist/${binary_name}" ./cmd/server

          cp "dist/${binary_name}" "staging/${binary_name}"
          cp README.md staging/
          cp .env.example staging/

      - name: Package tar.gz
        if: matrix.archive_ext == 'tar.gz'
        run: |
          tar -C staging -czf "${ASSET_BASENAME}.tar.gz" .

      - name: Package zip
        if: matrix.archive_ext == 'zip'
        run: |
          (cd staging && zip -r "../${ASSET_BASENAME}.zip" .)

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ASSET_BASENAME }}
          path: ${{ env.ASSET_BASENAME }}.${{ matrix.archive_ext }}
          if-no-files-found: error

  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build-release-assets

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
